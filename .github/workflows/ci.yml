name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

# Cancel superseded runs of the same ref; only the latest push matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macOS runner because this is a macOS app (Docker cannot build one).
    # The macos-15 image's default Xcode is 16.4, whose toolchain is
    # Swift 6.1 — enough for this package (swift-tools-version 6.0), so no
    # DEVELOPER_DIR / xcode-select pinning is needed. With a full Xcode
    # toolchain, `make test` degrades to plain `swift test --skip
    # SuttoE2ETests` (see docs/guides/testing.md).
    #
    # CI runs the unit suite only. The e2e suite (`make e2e`) needs the
    # Accessibility (TCC) permission, which cannot be granted on CI
    # runners, so it is local-only by design — see "Local-only by design"
    # in docs/guides/testing.md.
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Print Swift version
        run: swift --version

      # There are no external dependencies today, so this mainly speeds up
      # incremental compilation of our own targets between runs.
      - name: Cache SwiftPM build directory
        uses: actions/cache@v4
        with:
          path: .build
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Build
        run: make build

      - name: Run unit tests
        run: make test

      # Proves bundle assembly, including the `plutil -lint` of Info.plist.
      - name: Assemble app bundle
        run: make app
